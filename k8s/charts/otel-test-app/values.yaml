# Shared tag for the flask-app and celery-worker images. CI (.github/workflows/build.yaml)
# builds and pushes both images from the same commit under this same tag, so a single
# override (e.g. `--set image.tag=<git-sha>`) is enough to pin a release.
image:
  tag: "1.2.0"

flaskApp:
  replicaCount: 1
  image:
    repository: ghcr.io/jon-allen-public/otel-test-app
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: {}

celeryWorker:
  replicaCount: 1
  image:
    repository: ghcr.io/jon-allen-public/otel-test-app-celery
    pullPolicy: IfNotPresent
  resources: {}

redis:
  image:
    repository: redis
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources: {}

otel:
  enabled: true
  # If empty, both app deployments point at the bundled otel-lgtm collector below.
  # Set this to use an external OTLP endpoint instead.
  exporterEndpoint: ""

# grafana/otel-lgtm bundles an OTel Collector (OTLP on 4317/4318) with
# Grafana + Mimir/Prometheus (+ Tempo/Loki, unused here since only metrics
# are exported) so there's somewhere to send and view metrics out of the box.
otelLgtm:
  enabled: true
  image:
    repository: grafana/otel-lgtm
    tag: latest
    pullPolicy: IfNotPresent
  service:
    grafanaPort: 3000
    otlpGrpcPort: 4317
    otlpHttpPort: 4318
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
