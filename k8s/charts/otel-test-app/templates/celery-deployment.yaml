apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-test-app.fullname" . }}-celery-worker
  labels:
    {{- include "otel-test-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.celeryWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: "{{ .Values.celeryWorker.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.celeryWorker.image.pullPolicy }}
          env:
            - name: CELERY_BROKER_URL
              value: {{ include "otel-test-app.redisUrl" . }}
            - name: CELERY_RESULT_BACKEND
              value: {{ include "otel-test-app.redisUrl" . }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "otel-test-app.fullname" . }}-celery
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ include "otel-test-app.otlpEndpoint" . }}
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_TRACES_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
            {{- end }}
          resources:
            {{- toYaml .Values.celeryWorker.resources | nindent 12 }}
