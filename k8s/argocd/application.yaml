apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-test-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/jon-allen-public/otel-test-app.git
    targetRevision: main
    path: k8s/charts/otel-test-app
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: otel-test-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
