name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Flask app Docker image
      - name: Build Flask app Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/otel-test-app:latest -f Dockerfile .

      # Push the Flask app Docker image
      - name: Push Flask app Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/otel-test-app:latest

      # Build the Celery worker Docker image
      - name: Build Celery worker Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/otel-test-app-celery:latest -f Dockerfile.celery .

      # Push the Celery worker Docker image
      - name: Push Celery worker Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/otel-test-app-celery:latest